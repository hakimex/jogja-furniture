<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Jogja Furniture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--primary-dark); }
  .login-card { width:100%; max-width:400px; }
  .inp-wrap { position:relative; }
  .inp-wrap input { padding-right:2.5rem; }
  .inp-eye { position:absolute; right:.85rem; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-light); font-size:.9rem; }
  .login-footer { text-align:center; margin-top:1.5rem; font-size:.78rem; color:var(--text-light); }
  .login-footer a { color:var(--accent); }
</style>
</head>
<body id="loginPage">
<div class="login-card card">
  <div class="login-logo">
    <div class="logo-name">JOGJA</div>
    <div class="logo-sub">Furniture Decoration</div>
    <span class="admin-badge">🔐 Admin Panel</span>
  </div>

  <div class="login-err" id="loginErr"></div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label>Username atau Email</label>
      <input type="text" name="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="inp-wrap">
        <input type="password" name="password" id="passInput" placeholder="••••••••" autocomplete="current-password" required>
        <span class="inp-eye" onclick="togglePass()">👁</span>
      </div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem">
      Masuk ke Dashboard
    </button>
  </form>

  <div class="login-footer">
    <a href="../index.html" target="_blank">← Lihat Website</a>
    &nbsp;·&nbsp;
    
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
